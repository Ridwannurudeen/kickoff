<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kickoff Companion flow: one tx, three agents, three on-chain replies">
  <!-- Pitch background -->
  <rect width="1200" height="500" fill="#0a0e0a"/>

  <!-- Subtle pitch motif -->
  <line x1="600" y1="40" x2="600" y2="460" stroke="#1a2a1a" stroke-width="1.5"/>
  <circle cx="600" cy="250" r="80" fill="none" stroke="#1a2a1a" stroke-width="1.5"/>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow-grass" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16c060"/>
    </marker>
    <marker id="arrow-honor" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d4af37"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c8a7c"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="42" font-family="Cinzel, Georgia, serif" font-size="22" font-weight="700" fill="#e9e2cf" text-anchor="middle" letter-spacing="2">COMPANION FLOW</text>
  <text x="600" y="64" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#7c8a7c" text-anchor="middle">One tx -&gt; three Called events -&gt; three on-chain replies in ~5s</text>

  <!-- ===== STEP 1: User ===== -->
  <g transform="translate(40, 220)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#0e1410" stroke="#16c060" stroke-width="1.8"/>
    <!-- wallet icon -->
    <g transform="translate(16, 26)" stroke="#16c060" stroke-width="1.6" fill="none">
      <rect x="0" y="0" width="28" height="20" rx="3"/>
      <circle cx="22" cy="10" r="2.5" fill="#16c060"/>
    </g>
    <text x="56" y="32" font-family="Cinzel, Georgia, serif" font-size="15" font-weight="700" fill="#16c060">You</text>
    <text x="56" y="50" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e9e2cf">OKX Wallet</text>
    <text x="16" y="70" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">click "Ask the Companion"</text>
  </g>
  <text x="110" y="180" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c" text-anchor="middle" letter-spacing="2">1 · USER</text>

  <!-- arrow 1 -> 2 (honor: on-chain payment) -->
  <line x1="180" y1="260" x2="240" y2="260" stroke="#d4af37" stroke-width="2" marker-end="url(#arrow-honor)"/>

  <!-- ===== STEP 2: One tx ===== -->
  <g transform="translate(240, 200)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#1a1306" stroke="#d4af37" stroke-width="1.8"/>
    <text x="100" y="24" font-family="Cinzel, Georgia, serif" font-size="14" font-weight="700" fill="#d4af37" text-anchor="middle">composeAgents</text>
    <text x="100" y="42" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e9e2cf" text-anchor="middle">AgentRegistry</text>
    <line x1="20" y1="52" x2="180" y2="52" stroke="#23302a" stroke-width="1"/>
    <text x="100" y="68" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c" text-anchor="middle">payable</text>
    <text x="100" y="86" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#d4af37" text-anchor="middle">0.0003 OKB</text>
    <text x="100" y="102" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c" text-anchor="middle">3 x 0.0001 OKB · sub-cent</text>
    <text x="100" y="114" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c" text-anchor="middle">funds -&gt; agent wallets, fee = 0</text>
  </g>
  <text x="340" y="180" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c" text-anchor="middle" letter-spacing="2">2 · ONE TX</text>

  <!-- arrow 2 -> 3 (grass: events) -->
  <line x1="440" y1="260" x2="500" y2="260" stroke="#16c060" stroke-width="2" marker-end="url(#arrow-grass)"/>

  <!-- ===== STEP 3: 3 Called events ===== -->
  <g transform="translate(500, 200)">
    <rect x="0" y="0" width="180" height="120" rx="10" fill="#0e1410" stroke="#16c060" stroke-width="1.8"/>
    <text x="90" y="24" font-family="Cinzel, Georgia, serif" font-size="14" font-weight="700" fill="#16c060" text-anchor="middle">3 Called events</text>
    <text x="90" y="42" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e9e2cf" text-anchor="middle">fan-out on chain</text>
    <line x1="20" y1="52" x2="160" y2="52" stroke="#23302a" stroke-width="1"/>
    <!-- 3 dots fanning -->
    <g transform="translate(40, 70)">
      <circle cx="0" cy="0" r="5" fill="#16c060"/>
      <text x="14" y="4" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">Called(callId, match-analyst, ...)</text>
    </g>
    <g transform="translate(40, 86)">
      <circle cx="0" cy="0" r="5" fill="#16c060"/>
      <text x="14" y="4" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">Called(callId, personal-stats, ...)</text>
    </g>
    <g transform="translate(40, 102)">
      <circle cx="0" cy="0" r="5" fill="#16c060"/>
      <text x="14" y="4" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">Called(callId, highlights, ...)</text>
    </g>
  </g>
  <text x="590" y="180" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c" text-anchor="middle" letter-spacing="2">3 · EVENTS</text>

  <!-- 3 service lane arrows (grass) -->
  <line x1="680" y1="220" x2="740" y2="170" stroke="#16c060" stroke-width="1.6" marker-end="url(#arrow-grass)"/>
  <line x1="680" y1="260" x2="740" y2="260" stroke="#16c060" stroke-width="1.6" marker-end="url(#arrow-grass)"/>
  <line x1="680" y1="300" x2="740" y2="350" stroke="#16c060" stroke-width="1.6" marker-end="url(#arrow-grass)"/>

  <!-- ===== STEP 4: 3 service lanes ===== -->
  <text x="830" y="180" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c" text-anchor="middle" letter-spacing="2">4 · SERVICES + LLM</text>

  <!-- match-analyst lane -->
  <g transform="translate(740, 140)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#0e1410" stroke="#e9e2cf" stroke-width="1.5"/>
    <text x="10" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#e9e2cf">match-analyst</text>
    <text x="10" y="34" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">pre-match preview</text>
    <text x="10" y="50" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">Anthropic Claude Haiku 4.5</text>
  </g>

  <!-- personal-stats lane -->
  <g transform="translate(740, 230)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#0e1410" stroke="#e9e2cf" stroke-width="1.5"/>
    <text x="10" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#e9e2cf">personal-stats</text>
    <text x="10" y="34" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">reads FanRep.score(you)</text>
    <text x="10" y="50" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">Anthropic Claude Haiku 4.5</text>
  </g>

  <!-- highlights lane -->
  <g transform="translate(740, 320)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#0e1410" stroke="#e9e2cf" stroke-width="1.5"/>
    <text x="10" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#e9e2cf">highlights</text>
    <text x="10" y="34" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">post-match summary</text>
    <text x="10" y="50" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">Anthropic Claude Haiku 4.5</text>
  </g>

  <!-- 3 submitResult arrows (honor) -->
  <line x1="920" y1="170" x2="990" y2="195" stroke="#d4af37" stroke-width="1.8" marker-end="url(#arrow-honor)"/>
  <line x1="920" y1="260" x2="990" y2="260" stroke="#d4af37" stroke-width="1.8" marker-end="url(#arrow-honor)"/>
  <line x1="920" y1="350" x2="990" y2="325" stroke="#d4af37" stroke-width="1.8" marker-end="url(#arrow-honor)"/>

  <!-- ===== STEP 5: 3 submitResult txs ===== -->
  <g transform="translate(990, 180)">
    <rect x="0" y="0" width="170" height="160" rx="10" fill="#1a1306" stroke="#d4af37" stroke-width="1.8"/>
    <text x="85" y="24" font-family="Cinzel, Georgia, serif" font-size="13" font-weight="700" fill="#d4af37" text-anchor="middle">3 submitResult</text>
    <text x="85" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e9e2cf" text-anchor="middle">on chain · ~5s</text>
    <line x1="20" y1="50" x2="150" y2="50" stroke="#23302a" stroke-width="1"/>
    <text x="14" y="68" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#16c060">match-analyst</text>
    <text x="14" y="82" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">replies on chain</text>
    <text x="14" y="100" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#16c060">personal-stats</text>
    <text x="14" y="114" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">replies on chain</text>
    <text x="14" y="132" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#16c060">highlights</text>
    <text x="14" y="146" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">replies on chain</text>
  </g>
  <text x="1075" y="160" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c" text-anchor="middle" letter-spacing="2">5 · ON-CHAIN REPLIES</text>

  <!-- ===== BOTTOM: verified annotation ===== -->
  <g transform="translate(40, 410)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#16c060">End-to-end verified on X Layer testnet 1952</text>
    <text x="0" y="20" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">match-analyst: 0xd97e0d3f...   ·   personal-stats: 0x5a6bee5c...   ·   highlights: 0x3e8dd75c...   on OKLink</text>
    <text x="0" y="42" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">Replies decode to real text. Honor-gold = on-chain settlement moments. Grass-green = self-driven steps.</text>
  </g>

  <!-- Signature -->
  <text x="1180" y="488" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c" text-anchor="end">Kickoff v2 · Companion via AgentRegistry.composeAgents</text>
</svg>
