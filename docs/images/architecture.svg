<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kickoff v2 contract architecture">
  <!-- Pitch background -->
  <rect width="1200" height="800" fill="#0a0e0a"/>

  <!-- Subtle pitch motif -->
  <line x1="600" y1="40" x2="600" y2="760" stroke="#1a2a1a" stroke-width="1.5"/>
  <circle cx="600" cy="400" r="120" fill="none" stroke="#1a2a1a" stroke-width="1.5"/>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c8a7c"/>
    </marker>
    <marker id="arrow-grass" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16c060"/>
    </marker>
    <marker id="arrow-honor" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d4af37"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="44" font-family="Cinzel, Georgia, serif" font-size="26" font-weight="700" fill="#e9e2cf" text-anchor="middle" letter-spacing="2">KICKOFF v2 ARCHITECTURE</text>
  <text x="600" y="68" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" fill="#7c8a7c" text-anchor="middle">Five new v2 contracts + reused v1 oracle layer + off-chain agent services</text>

  <!-- ===== TOP ROW: OKX Wallet + web dApp ===== -->

  <!-- OKX Wallet -->
  <g transform="translate(420, 100)">
    <rect x="0" y="0" width="160" height="60" rx="10" fill="#121712" stroke="#23302a" stroke-width="1.5"/>
    <circle cx="22" cy="30" r="10" fill="none" stroke="#e9e2cf" stroke-width="1.5"/>
    <path d="M 14 30 L 22 22 L 30 30 L 22 38 z" fill="#e9e2cf"/>
    <text x="44" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e9e2cf">OKX Wallet</text>
    <text x="44" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">OKB gas + agent fees</text>
  </g>

  <!-- web/ dApp -->
  <g transform="translate(620, 100)">
    <rect x="0" y="0" width="160" height="60" rx="10" fill="#121712" stroke="#23302a" stroke-width="1.5"/>
    <rect x="14" y="20" width="22" height="20" rx="2" fill="none" stroke="#e9e2cf" stroke-width="1.5"/>
    <line x1="14" y1="26" x2="36" y2="26" stroke="#e9e2cf" stroke-width="1.5"/>
    <text x="48" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e9e2cf">web/  Next.js dApp</text>
    <text x="48" y="46" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">/quests · /league · /companion</text>
  </g>

  <!-- Wallet to web arrow -->
  <line x1="580" y1="130" x2="620" y2="130" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- web -> bus (down) -->
  <line x1="700" y1="160" x2="700" y2="220" stroke="#7c8a7c" stroke-width="1.5"/>
  <!-- bus -->
  <line x1="130" y1="220" x2="1070" y2="220" stroke="#23302a" stroke-width="1.5"/>
  <!-- bus to each tile -->
  <line x1="180" y1="220" x2="180" y2="270" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="220" x2="370" y2="270" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="220" x2="560" y2="270" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="220" x2="750" y2="270" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="940" y1="220" x2="940" y2="270" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== MIDDLE ROW: 5 v2 contract tiles ===== -->

  <!-- FanRep -->
  <g transform="translate(100, 270)">
    <rect x="0" y="0" width="160" height="130" rx="12" fill="#0e1410" stroke="#16c060" stroke-width="1.8"/>
    <!-- chain link icon -->
    <g transform="translate(20, 16)" stroke="#16c060" stroke-width="1.6" fill="none">
      <rect x="0" y="4" width="14" height="9" rx="4.5"/>
      <rect x="10" y="4" width="14" height="9" rx="4.5"/>
    </g>
    <text x="50" y="28" font-family="Cinzel, Georgia, serif" font-size="15" font-weight="700" fill="#16c060">FanRep</text>
    <text x="20" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e9e2cf">Soulbound ERC-721,</text>
    <text x="20" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e9e2cf">one per wallet.</text>
    <text x="20" y="92" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">Multi-dim reputation:</text>
    <text x="20" y="106" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">accuracy · breadth ·</text>
    <text x="20" y="120" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">longevity</text>
  </g>

  <!-- QuestEngine -->
  <g transform="translate(290, 270)">
    <rect x="0" y="0" width="160" height="130" rx="12" fill="#0e1410" stroke="#16c060" stroke-width="1.8"/>
    <!-- diamond icon -->
    <polygon points="28,9 38,21 28,33 18,21" fill="none" stroke="#16c060" stroke-width="1.6"/>
    <text x="50" y="28" font-family="Cinzel, Georgia, serif" font-size="15" font-weight="700" fill="#16c060">QuestEngine</text>
    <text x="20" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e9e2cf">Quest defs + XP.</text>
    <text x="20" y="76" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">SELF_ATTEST · PREDICTION</text>
    <text x="20" y="90" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">(commit-reveal) ·</text>
    <text x="20" y="104" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">EXTERNAL_PROOF</text>
    <text x="20" y="120" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">(admin-signed)</text>
  </g>

  <!-- Trophy -->
  <g transform="translate(480, 270)">
    <rect x="0" y="0" width="160" height="130" rx="12" fill="#0e1410" stroke="#16c060" stroke-width="1.8"/>
    <!-- trophy cup icon -->
    <g transform="translate(18, 9)" stroke="#16c060" stroke-width="1.6" fill="none">
      <path d="M 4 2 L 20 2 L 18 14 Q 12 20 6 14 Z"/>
      <path d="M 4 4 L 0 4 Q 0 10 6 10"/>
      <path d="M 20 4 L 24 4 Q 24 10 18 10"/>
      <line x1="12" y1="20" x2="12" y2="26"/>
      <line x1="6" y1="28" x2="18" y2="28"/>
    </g>
    <text x="50" y="28" font-family="Cinzel, Georgia, serif" font-size="15" font-weight="700" fill="#16c060">Trophy</text>
    <text x="20" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e9e2cf">ERC-1155 commemoratives.</text>
    <text x="20" y="76" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">Fixed-supply, deterministic.</text>
    <text x="20" y="90" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">Gas-only claim.</text>
    <text x="20" y="110" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">No randomness, no fee.</text>
  </g>

  <!-- AgentRegistry -->
  <g transform="translate(670, 270)">
    <rect x="0" y="0" width="160" height="130" rx="12" fill="#0e1410" stroke="#16c060" stroke-width="1.8"/>
    <!-- agent token icon -->
    <g transform="translate(18, 10)" stroke="#16c060" stroke-width="1.6" fill="none">
      <rect x="0" y="0" width="22" height="22" rx="2"/>
      <circle cx="11" cy="8" r="3"/>
      <path d="M 4 20 Q 11 13 18 20"/>
    </g>
    <text x="50" y="28" font-family="Cinzel, Georgia, serif" font-size="15" font-weight="700" fill="#16c060">AgentRegistry</text>
    <text x="20" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e9e2cf">Permissionless agents.</text>
    <text x="20" y="76" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">callAgent (payable OKB)</text>
    <text x="20" y="90" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">composeAgents (fan-out)</text>
    <text x="20" y="110" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">submitResult (signed)</text>
  </g>

  <!-- AgentLeague -->
  <g transform="translate(860, 270)">
    <rect x="0" y="0" width="160" height="130" rx="12" fill="#0e1410" stroke="#16c060" stroke-width="1.8"/>
    <!-- podium icon -->
    <g transform="translate(18, 10)" stroke="#16c060" stroke-width="1.6" fill="none">
      <rect x="9" y="2" width="8" height="20"/>
      <rect x="0" y="8" width="9" height="14"/>
      <rect x="17" y="11" width="9" height="11"/>
    </g>
    <text x="50" y="28" font-family="Cinzel, Georgia, serif" font-size="15" font-weight="700" fill="#16c060">AgentLeague</text>
    <text x="20" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e9e2cf">BYO seasons.</text>
    <text x="20" y="76" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">enterAgent (free)</text>
    <text x="20" y="90" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">submitPrediction (hash)</text>
    <text x="20" y="104" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">scorePrediction (reveal)</text>
    <text x="20" y="120" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">AI Champion trophy</text>
  </g>

  <!-- QuestEngine -> FanRep recordXP -->
  <path d="M 290 335 Q 270 335 260 335" fill="none" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="275" y="328" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c" text-anchor="middle">recordXP</text>

  <!-- AgentLeague -> Trophy operatorMint (curve over the row) -->
  <path d="M 940 270 Q 940 232 770 232 Q 600 232 560 270" fill="none" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="750" y="226" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c" text-anchor="middle">operatorMint(AI Champion)</text>

  <!-- AgentLeague -> CT (read payouts) - down-right curve -->
  <path d="M 980 400 Q 1000 470 940 530" fill="none" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="1030" y="465" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">read payouts</text>

  <!-- QuestEngine -> CT (read payouts) -->
  <path d="M 360 400 Q 380 480 700 530" fill="none" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="370" y="445" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">read payouts</text>

  <!-- ===== BOTTOM ROW: OO + CT + keeper + 3 services ===== -->

  <!-- Section label -->
  <text x="100" y="495" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c" letter-spacing="2">REUSED ORACLE LAYER + OFF-CHAIN</text>
  <line x1="100" y1="504" x2="1100" y2="504" stroke="#23302a" stroke-width="1"/>

  <!-- OptimisticOracle (reused, honor-gold) -->
  <g transform="translate(100, 530)">
    <rect x="0" y="0" width="180" height="110" rx="12" fill="#0e1410" stroke="#d4af37" stroke-width="1.8"/>
    <text x="14" y="24" font-family="Cinzel, Georgia, serif" font-size="14" font-weight="700" fill="#d4af37">OptimisticOracle</text>
    <text x="14" y="44" font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#e9e2cf">propose -&gt; 120s -&gt; settle</text>
    <text x="14" y="60" font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#7c8a7c">Sole resolution path.</text>
    <text x="14" y="74" font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#7c8a7c">Dispute / cancel paths.</text>
    <!-- tag -->
    <g transform="translate(14, 84)">
      <rect x="0" y="0" width="100" height="16" rx="8" fill="#1a1306" stroke="#d4af37" stroke-width="1"/>
      <text x="50" y="11" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#d4af37" text-anchor="middle" letter-spacing="1">REUSED FROM v1</text>
    </g>
  </g>

  <!-- ConditionalTokens (reused) -->
  <g transform="translate(300, 530)">
    <rect x="0" y="0" width="180" height="110" rx="12" fill="#0e1410" stroke="#d4af37" stroke-width="1.8"/>
    <text x="14" y="24" font-family="Cinzel, Georgia, serif" font-size="14" font-weight="700" fill="#d4af37">ConditionalTokens</text>
    <text x="14" y="44" font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#e9e2cf">conditionStatus +</text>
    <text x="14" y="58" font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#e9e2cf">payoutNumerators</text>
    <text x="14" y="74" font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#7c8a7c">General-purpose result</text>
    <text x="14" y="88" font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#7c8a7c">store. No betting surface.</text>
    <!-- tag -->
    <g transform="translate(64, 92)">
      <rect x="0" y="0" width="100" height="16" rx="8" fill="#1a1306" stroke="#d4af37" stroke-width="1"/>
      <text x="50" y="11" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#d4af37" text-anchor="middle" letter-spacing="1">REUSED FROM v1</text>
    </g>
  </g>

  <!-- keeper (off-chain) -->
  <g transform="translate(500, 530)">
    <rect x="0" y="0" width="180" height="110" rx="12" fill="#0e1410" stroke="#23302a" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="14" y="24" font-family="Cinzel, Georgia, serif" font-size="14" font-weight="700" fill="#e9e2cf">keeper</text>
    <text x="14" y="44" font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#7c8a7c">Off-chain Node service.</text>
    <text x="14" y="60" font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#7c8a7c">Rolling 7d quest window:</text>
    <text x="14" y="74" font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#7c8a7c">register -&gt; propose -&gt; settle</text>
    <text x="14" y="92" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">openfootball / API-FOOTBALL</text>
  </g>

  <!-- OO -> CT arrow (write payouts) -->
  <line x1="280" y1="585" x2="300" y2="585" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="290" y="578" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c" text-anchor="middle">write</text>

  <!-- keeper -> OO -->
  <path d="M 500 570 Q 380 540 290 530" fill="none" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="395" y="540" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">propose</text>

  <!-- keeper -> QuestEngine (curve up) -->
  <path d="M 540 530 Q 480 470 400 400" fill="none" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="430" y="490" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">register</text>

  <!-- ===== 3 SERVICE TILES ===== -->

  <!-- match-analyst -->
  <g transform="translate(700, 530)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#0e1410" stroke="#e9e2cf" stroke-width="1.5"/>
    <circle cx="20" cy="25" r="7" fill="none" stroke="#e9e2cf" stroke-width="1.5"/>
    <text x="36" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#e9e2cf">match-analyst</text>
    <text x="36" y="38" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">pre-match preview</text>
  </g>

  <!-- personal-stats -->
  <g transform="translate(700, 590)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#0e1410" stroke="#e9e2cf" stroke-width="1.5"/>
    <circle cx="20" cy="25" r="7" fill="none" stroke="#e9e2cf" stroke-width="1.5"/>
    <text x="36" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#e9e2cf">personal-stats</text>
    <text x="36" y="38" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">XP trajectory + coaching</text>
  </g>

  <!-- highlights -->
  <g transform="translate(880, 530)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#0e1410" stroke="#e9e2cf" stroke-width="1.5"/>
    <circle cx="20" cy="25" r="7" fill="none" stroke="#e9e2cf" stroke-width="1.5"/>
    <text x="36" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#e9e2cf">highlights</text>
    <text x="36" y="38" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">post-match summary</text>
  </g>

  <!-- LLM box -->
  <g transform="translate(880, 590)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#0e1410" stroke="#7c8a7c" stroke-width="1.2" stroke-dasharray="4,3"/>
    <text x="80" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#7c8a7c" text-anchor="middle">Claude Haiku 4.5</text>
    <text x="80" y="38" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c" text-anchor="middle">(each service calls LLM)</text>
  </g>

  <!-- AgentRegistry -> services (Called events) -->
  <path d="M 760 400 Q 750 460 720 530" fill="none" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="690" y="460" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">emits</text>
  <text x="690" y="472" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">Called</text>

  <path d="M 780 400 Q 820 460 900 530" fill="none" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- services -> submitResult back -->
  <path d="M 700 555 Q 620 480 760 400" fill="none" stroke="#7c8a7c" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="630" y="425" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c8a7c">submitResult</text>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(100, 690)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c" letter-spacing="2">LEGEND</text>
    <line x1="0" y1="10" x2="1000" y2="10" stroke="#23302a" stroke-width="1"/>

    <rect x="0" y="22" width="14" height="14" rx="3" fill="#0e1410" stroke="#16c060" stroke-width="1.6"/>
    <text x="22" y="33" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e9e2cf">v2 contract (new)</text>

    <rect x="170" y="22" width="14" height="14" rx="3" fill="#0e1410" stroke="#d4af37" stroke-width="1.6"/>
    <text x="192" y="33" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e9e2cf">reused from v1</text>

    <rect x="340" y="22" width="14" height="14" rx="3" fill="#0e1410" stroke="#e9e2cf" stroke-width="1.5"/>
    <text x="362" y="33" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e9e2cf">off-chain service</text>

    <line x1="510" y1="29" x2="540" y2="29" stroke="#7c8a7c" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="548" y="33" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e9e2cf">call / write</text>

    <line x1="640" y1="29" x2="670" y2="29" stroke="#7c8a7c" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
    <text x="678" y="33" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e9e2cf">read / async reply</text>
  </g>

  <!-- Signature -->
  <text x="20" y="788" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c">Kickoff v2 · X Layer testnet 1952</text>
  <text x="1180" y="788" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7c8a7c" text-anchor="end">Solidity 0.8.26 · OpenZeppelin v5 · Foundry · 211 tests green</text>
</svg>
