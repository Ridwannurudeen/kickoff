<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kickoff — Day 1 of #BuildX">
  <!-- Pitch background -->
  <rect width="1200" height="675" fill="#0a0e0a"/>

  <!-- Subtle pitch motif: halfway line, center circle, center spot, corner arcs -->
  <line x1="600" y1="60" x2="600" y2="615" stroke="#1a2a1a" stroke-width="2"/>
  <circle cx="600" cy="337" r="140" fill="none" stroke="#1a2a1a" stroke-width="2"/>
  <circle cx="600" cy="337" r="5" fill="#1a2a1a"/>
  <path d="M 60,60 a 40,40 0 0 1 -40,-40" fill="none" stroke="#1a2a1a" stroke-width="2"/>
  <path d="M 1140,60 a 40,40 0 0 0 40,-40" fill="none" stroke="#1a2a1a" stroke-width="2"/>
  <path d="M 60,615 a 40,40 0 0 0 -40,40" fill="none" stroke="#1a2a1a" stroke-width="2"/>
  <path d="M 1140,615 a 40,40 0 0 1 40,40" fill="none" stroke="#1a2a1a" stroke-width="2"/>

  <!-- Top-left lockup: tiny K-mark + small wordmark -->
  <g transform="translate(60, 55)" fill="#16c060">
    <rect x="0" y="0" width="24" height="84" rx="2"/>
    <polygon points="24,33 58,0 84,0 50,38"/>
    <polygon points="24,51 50,46 84,84 58,84"/>
  </g>
  <circle cx="146" cy="139" r="6" fill="#3cf08a"/>
  <text x="166" y="110" font-family="Inter, -apple-system, system-ui, 'Segoe UI', sans-serif"
        font-size="34" font-weight="800" fill="#e9f2e9" letter-spacing="-1">kickoff</text>

  <!-- Center: big wordmark + tagline -->
  <text x="600" y="300" font-family="Inter, -apple-system, system-ui, 'Segoe UI', sans-serif"
        font-size="128" font-weight="900" fill="#16c060"
        text-anchor="middle" letter-spacing="-4">kickoff</text>
  <text x="600" y="365" font-family="Inter, -apple-system, system-ui, 'Segoe UI', sans-serif"
        font-size="36" font-weight="500" fill="#e9f2e9"
        text-anchor="middle">Your World Cup, on-chain.</text>
  <text x="600" y="410" font-family="Inter, -apple-system, system-ui, 'Segoe UI', sans-serif"
        font-size="22" font-weight="500" fill="#7c8a7c"
        text-anchor="middle">A free fan platform on @XLayerOfficial</text>

  <!-- Day 1 ribbon -->
  <g transform="translate(600, 560)">
    <rect x="-160" y="0" width="320" height="52" rx="26" fill="#121712" stroke="#23302a" stroke-width="2"/>
    <text x="0" y="34" font-family="Inter, system-ui, sans-serif"
          font-size="20" font-weight="700" fill="#16c060"
          text-anchor="middle" letter-spacing="0.5">Day 1 of #BuildX</text>
  </g>
</svg>
